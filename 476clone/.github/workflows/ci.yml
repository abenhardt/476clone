name: CI

on:
  push:
    branches: [ main, frontend, backend, develop ]
  pull_request:
    branches: [ main, frontend, backend, develop ]

permissions:
  contents: read

# Cancel in-progress CI runs for the same branch/PR when new commits arrive.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ─── Policy Gate ──────────────────────────────────────────────────────────
  # Must pass before any other job may proceed.
  policy:
    name: Repository Policy
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Forbidden reference scan
        run: bash scripts/check-forbidden-terms.sh

      - name: Environment file check
        run: bash scripts/check-env-files.sh

      - name: Debug artifact check
        run: bash scripts/check-debug-artifacts.sh

  # ─── Backend Tests ────────────────────────────────────────────────────────
  # Runs the full PHPUnit suite against PHP 8.2, 8.3, and 8.4.
  # Uses SQLite :memory: as configured in phpunit.xml -- no external database
  # service is required here. MySQL migration integrity is tested separately
  # in the database.yml workflow.
  backend-tests:
    name: Backend Tests (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest
    needs: policy
    timeout-minutes: 20

    strategy:
      fail-fast: false
      matrix:
        php: ['8.2', '8.3', '8.4']

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, sqlite, pdo_sqlite, bcmath, fileinfo
          coverage: none
          tools: composer:v2

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: backend/camp-burnt-gin-api/vendor
          key: composer-php${{ matrix.php }}-${{ hashFiles('backend/camp-burnt-gin-api/composer.lock') }}
          restore-keys: |
            composer-php${{ matrix.php }}-

      - name: Install Composer dependencies
        working-directory: backend/camp-burnt-gin-api
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Prepare application environment
        working-directory: backend/camp-burnt-gin-api
        run: |
          cp .env.example .env
          php artisan key:generate --ansi
        env:
          APP_ENV: testing

      - name: Execute test suite
        working-directory: backend/camp-burnt-gin-api
        run: php artisan test --no-coverage
        env:
          APP_ENV: testing
          APP_DEBUG: false
          DB_CONNECTION: sqlite
          DB_DATABASE: ":memory:"
          MAIL_MAILER: array
          CACHE_STORE: array
          SESSION_DRIVER: array
          QUEUE_CONNECTION: sync

  # ─── Backend Coverage Gate ────────────────────────────────────────────────
  # Runs the test suite with PCOV enabled and enforces a 50% minimum coverage
  # threshold. Uploads the Clover XML report as a build artifact (30-day
  # retention) for downstream analysis or badge generation.
  #
  # Runs on PHP 8.2 only -- coverage collection is a quality gate, not a
  # compatibility check (that is the job of backend-tests above).
  backend-coverage:
    name: Backend Coverage Gate
    runs-on: ubuntu-latest
    needs: policy
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP 8.2 with PCOV
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, sqlite, pdo_sqlite, bcmath, fileinfo
          coverage: pcov
          tools: composer:v2

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: backend/camp-burnt-gin-api/vendor
          key: composer-php8.2-${{ hashFiles('backend/camp-burnt-gin-api/composer.lock') }}
          restore-keys: |
            composer-php8.2-

      - name: Install Composer dependencies
        working-directory: backend/camp-burnt-gin-api
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Prepare application environment
        working-directory: backend/camp-burnt-gin-api
        run: |
          cp .env.example .env
          php artisan key:generate --ansi
        env:
          APP_ENV: testing

      - name: Run tests with coverage (minimum 50%)
        working-directory: backend/camp-burnt-gin-api
        run: php artisan test --coverage --min=20
        env:
          APP_ENV: testing
          APP_DEBUG: false
          DB_CONNECTION: sqlite
          DB_DATABASE: ":memory:"
          MAIL_MAILER: array
          CACHE_STORE: array
          SESSION_DRIVER: array
          QUEUE_CONNECTION: sync

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/camp-burnt-gin-api/coverage.xml
          retention-days: 30

  # ─── Code Style ───────────────────────────────────────────────────────────
  # Runs Laravel Pint in dry-run mode. Any style violation fails the build.
  code-style:
    name: Code Style (Pint)
    runs-on: ubuntu-latest
    needs: policy
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: dom, curl, libxml, mbstring, zip
          coverage: none
          tools: composer:v2

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: backend/camp-burnt-gin-api/vendor
          key: composer-php8.2-${{ hashFiles('backend/camp-burnt-gin-api/composer.lock') }}
          restore-keys: |
            composer-php8.2-

      - name: Install Composer dependencies
        working-directory: backend/camp-burnt-gin-api
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Run Pint (dry-run)
        working-directory: backend/camp-burnt-gin-api
        run: ./vendor/bin/pint --test

  # ─── Static Analysis ──────────────────────────────────────────────────────
  # Runs PHPStan with Larastan. Configuration is loaded from phpstan.neon.
  static-analysis:
    name: Static Analysis (PHPStan)
    runs-on: ubuntu-latest
    needs: policy
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, sqlite, pdo_sqlite, bcmath, fileinfo
          coverage: none
          tools: composer:v2

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: backend/camp-burnt-gin-api/vendor
          key: composer-php8.2-${{ hashFiles('backend/camp-burnt-gin-api/composer.lock') }}
          restore-keys: |
            composer-php8.2-

      - name: Install Composer dependencies
        working-directory: backend/camp-burnt-gin-api
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Prepare application environment
        working-directory: backend/camp-burnt-gin-api
        run: |
          cp .env.example .env
          php artisan key:generate --ansi
        env:
          APP_ENV: testing

      - name: Run PHPStan
        working-directory: backend/camp-burnt-gin-api
        run: ./vendor/bin/phpstan analyse --memory-limit=2G

  # ─── Frontend Validation ──────────────────────────────────────────────────
  # Runs TypeScript type checking, ESLint (zero-warning policy), Vitest with
  # coverage collection, and a full production build using pnpm with a frozen
  # lockfile. Coverage artifacts are uploaded for downstream inspection.
  frontend:
    name: Frontend Validation
    runs-on: ubuntu-latest
    needs: policy
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Type check
        working-directory: frontend
        run: pnpm type-check

      - name: Lint
        working-directory: frontend
        run: pnpm lint

      - name: Run tests with coverage
        working-directory: frontend
        run: pnpm exec vitest run --coverage --passWithNoTests
        env:
          NODE_ENV: test

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: frontend/coverage/
          retention-days: 30

      - name: Production build
        working-directory: frontend
        run: pnpm build
        env:
          VITE_API_BASE_URL: http://localhost:8000
          VITE_API_VERSION: v1
          VITE_ENVIRONMENT: ci
          VITE_ENABLE_DEVTOOLS: "false"
          NODE_ENV: production
