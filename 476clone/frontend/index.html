<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Camp Burnt Gin - Camp registration and management platform"
    />
    <!--
      CONTENT SECURITY POLICY — MUST be configured at the reverse-proxy level
      (nginx/Apache) via HTTP response headers for full coverage. Meta tags do
      not support frame-ancestors, upgrade-insecure-requests, or report-uri.

      Recommended production nginx snippet:
      ────────────────────────────────────────────────────────────────────────
      add_header Content-Security-Policy "
        default-src 'none';
        script-src 'self';
        style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
        font-src 'self' https://fonts.gstatic.com data:;
        img-src 'self' data: https:;
        connect-src 'self' https://api.campburntgin.org;
        worker-src 'self' blob:;
        frame-src 'none';
        frame-ancestors 'none';
        object-src 'none';
        base-uri 'self';
        form-action 'self';
        upgrade-insecure-requests;
      " always;
      ────────────────────────────────────────────────────────────────────────
      Note: style-src requires 'unsafe-inline' because the app uses extensive
      inline styles for the CSS variable design system (framer-motion, theme
      tokens). Migrate to CSS classes to eventually remove this.
    -->

    <!-- Figma Design Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@500;600;700;800;900&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">

    <title>Camp Burnt Gin</title>

    <!-- Preferences: synchronous before first paint — prevents flicker -->
    <script>
      (function () {
        try {
          var FONT_KEY = 'cbg-font-scale';
          var HC_KEY = 'cbg-high-contrast';
          var RM_KEY = 'cbg-reduced-motion';
          var html = document.documentElement;

          // ── Font scale (default: default) ─────────────────────────────────
          var scale = localStorage.getItem(FONT_KEY) || 'default';
          html.setAttribute('data-font-scale', scale);

          // ── High contrast ─────────────────────────────────────────────────
          if (localStorage.getItem(HC_KEY) === 'true') {
            html.setAttribute('data-high-contrast', 'true');
          }

          // ── Reduced motion ────────────────────────────────────────────────
          if (localStorage.getItem(RM_KEY) === 'true') {
            html.setAttribute('data-reduced-motion', 'true');
          }
        } catch (e) {
          document.documentElement.setAttribute('data-font-scale', 'default');
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/app/main.tsx"></script>
  </body>
</html>
